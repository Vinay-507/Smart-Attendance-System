<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Smart Attendance System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div>
                <h1 class="brand-title">Smart Attendance System</h1>
                <div class="muted">Face recognition attendance from a single classroom image</div>
            </div>
            <nav class="d-flex gap-2">
                <a class="btn btn-outline-primary btn-sm" href="/">Dashboard</a>
                <a class="btn btn-outline-primary btn-sm" href="{{ url_for('students.list_students') }}">Students</a>
                <a class="btn btn-outline-primary btn-sm" href="{{ url_for('attendance.capture_attendance') }}">Attendance</a>
                <a class="btn btn-outline-primary btn-sm" href="{{ url_for('reports.attendance_reports') }}">Reports</a>
                <a class="btn btn-primary btn-sm" href="{{ url_for('students.register_student') }}">Register</a>
            </nav>
        </header>

        {% block content %}{% endblock %}

        <footer class="mt-4 small muted">
            &copy; <span data-current-year></span> Smart Attendance System
        </footer>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
